<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chrome Sapphire Pack Opener</title>
<style>
:root {
  --bg:#050816; --panel:#0b1230; --ink:#eaf4ff; --muted:#8fa9c9; --blue:#145cff; --cyan:#30e8ff; --gold:#ffd36d;
}
* { box-sizing:border-box; }
body {
  margin:0; font-family:Inter, system-ui, -apple-system, Segoe UI, sans-serif;
  color:var(--ink); background:
    radial-gradient(circle at 20% 15%, rgba(0,114,255,.35), transparent 28%),
    radial-gradient(circle at 80% 10%, rgba(0,255,213,.18), transparent 24%),
    linear-gradient(135deg,#030612,#071333 55%,#02040b);
  min-height:100vh; overflow-x:hidden;
}
.wrap { max-width:1200px; margin:0 auto; padding:24px; }
header { display:flex; gap:18px; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; }
h1 { margin:0; font-size:clamp(28px,4vw,54px); letter-spacing:-.04em; line-height:.95; }
.sub { color:var(--muted); margin-top:8px; max-width:700px; }
button {
  border:0; border-radius:16px; color:white; background:linear-gradient(135deg,#123dff,#10d8ff);
  padding:14px 20px; font-weight:800; cursor:pointer; box-shadow:0 12px 35px rgba(0,80,255,.35);
}
button.secondary { background:#162144; box-shadow:none; color:#cfe8ff; }
.controls { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
.stats { display:grid; grid-template-columns:repeat(4,minmax(120px,1fr)); gap:12px; margin-bottom:20px; }
.stat { background:rgba(11,18,48,.74); border:1px solid rgba(108,182,255,.22); border-radius:18px; padding:14px; backdrop-filter:blur(8px); }
.stat b { display:block; font-size:24px; }
.stat span { color:var(--muted); font-size:13px; }
.packzone { min-height:430px; display:grid; grid-template-columns:repeat(4, minmax(190px,1fr)); gap:18px; align-items:stretch; }
.card {
  position:relative; min-height:340px; border-radius:22px; padding:16px; overflow:hidden;
  background:linear-gradient(160deg,#07164c,#0c2e91 45%,#06103a);
  border:2px solid rgba(135,217,255,.35);
  box-shadow:0 18px 45px rgba(0,0,0,.45), inset 0 0 34px rgba(85,203,255,.18);
  transform-style:preserve-3d; animation:deal .45s ease both;
}
.card::before {
  content:""; position:absolute; inset:0; opacity:.9;
  background:
    linear-gradient(35deg, transparent 8%, rgba(0,255,255,.38) 10%, transparent 14%),
    linear-gradient(120deg, transparent 20%, rgba(255,255,255,.18) 24%, transparent 31%),
    linear-gradient(220deg, transparent 34%, rgba(27,69,255,.55) 39%, transparent 43%),
    linear-gradient(310deg, transparent 52%, rgba(50,255,139,.38) 56%, transparent 60%),
    radial-gradient(circle at 60% 40%, rgba(255,255,255,.18), transparent 22%);
  clip-path:polygon(0 0,100% 0,100% 100%,0 100%);
}
.card::after {
  content:""; position:absolute; inset:12px; border-radius:16px; border:1px solid rgba(255,255,255,.18); pointer-events:none;
}
@keyframes deal { from { opacity:0; transform:translateY(35px) scale(.92) rotate(-2deg); } to { opacity:1; transform:none; } }
.side {
  position:absolute; left:0; top:0; bottom:0; width:58px; background:linear-gradient(#101849,#050a24);
  border-right:6px solid rgba(255,255,255,.82); display:flex; align-items:center; justify-content:center; z-index:2;
}
.side span { transform:rotate(-90deg); white-space:nowrap; color:#f4fbff; font-weight:900; letter-spacing:.02em; font-size:16px; }
.logo { position:absolute; right:18px; top:16px; z-index:2; font-weight:900; font-style:italic; color:#dff7ff; text-shadow:0 0 8px #41eeff; }
.rc { position:absolute; left:16px; bottom:16px; z-index:2; border:2px solid white; border-radius:10px; padding:3px 8px; font-weight:900; }
.badge { position:absolute; right:16px; bottom:16px; z-index:2; width:76px; height:76px; border-radius:50%; border:3px solid rgba(255,255,255,.82); display:grid; place-items:center; text-align:center; font-size:11px; font-weight:900; background:rgba(2,8,30,.6); }
.player {
  position:absolute; left:76px; right:18px; top:72px; bottom:96px; z-index:1; display:grid; place-items:center;
  font-size:72px; font-weight:1000; opacity:.62; color:rgba(255,255,255,.88); text-shadow:0 0 20px rgba(31,222,255,.7);
}
.info { position:absolute; left:78px; right:18px; bottom:96px; z-index:3; }
.no { font-size:12px; color:#b8d7ff; font-weight:800; }
.name { font-size:24px; line-height:1; font-weight:1000; text-shadow:0 2px 10px #001; }
.team { margin-top:7px; color:#c9e5ff; font-weight:700; }
.rarity { position:absolute; left:78px; top:18px; z-index:3; padding:7px 10px; border-radius:999px; background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.2); font-size:12px; font-weight:900; }
.insert { background:linear-gradient(160deg,#061439,#102ac4 38%,#3e0f84); }
.insert .side { background:linear-gradient(#35124f,#090b35); }
.auto { background:linear-gradient(160deg,#0b081d,#072b6b 35%,#351103 75%,#7b4700); border-color:rgba(255,211,109,.75); }
.auto .logo { color:#ffeab0; text-shadow:0 0 10px #ffb800; }
.auto .sig { position:absolute; left:80px; right:18px; bottom:54px; z-index:4; color:#ffd36d; font-family:cursive; font-size:25px; transform:rotate(-4deg); }
.parallel-Green { filter:hue-rotate(80deg) saturate(1.25); }
.parallel-Gold { box-shadow:0 18px 45px rgba(0,0,0,.45), inset 0 0 44px rgba(255,211,109,.55); border-color:rgba(255,211,109,.7); }
.parallel-Orange { filter:hue-rotate(145deg) saturate(1.2); }
.parallel-Purple { filter:hue-rotate(235deg) saturate(1.35); }
.parallel-Black { filter:brightness(.62) contrast(1.3); }
.parallel-Red { filter:hue-rotate(170deg) saturate(1.7); }
.parallel-Padparadscha { filter:hue-rotate(130deg) saturate(1.9) brightness(1.15); }
.tabs { display:flex; gap:8px; margin:22px 0 12px; flex-wrap:wrap; }
.tab { background:#101a3d; padding:10px 14px; border-radius:999px; color:#cbe6ff; font-weight:800; cursor:pointer; }
.tab.active { background:#1c76ff; color:white; }
.collection { background:rgba(11,18,48,.72); border:1px solid rgba(108,182,255,.18); border-radius:20px; padding:16px; max-height:360px; overflow:auto; }
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:8px; }
.item { display:flex; justify-content:space-between; gap:8px; padding:8px 10px; border-radius:12px; background:rgba(255,255,255,.06); color:#dbeeff; font-size:13px; }
.item small { color:#8fb3dd; }
@media (max-width:900px) { .packzone { grid-template-columns:repeat(2, minmax(160px,1fr)); } .stats { grid-template-columns:repeat(2,1fr); } }
@media (max-width:520px) { .packzone { grid-template-columns:1fr; } .card { min-height:320px; } }
</style>
</head>
<body>
<div class="wrap">
<header>
  <div>
    <h1>Chrome Sapphire<br>Pack Opener</h1>
    <div class="sub">Simple fan-made pack game built from your checklist. Open 4-card packs, chase inserts, parallels, and Sapphire Autographs.</div>
  </div>
  <div class="controls">
    <button onclick="openPack()">Open Pack</button>
    <button class="secondary" onclick="resetGame()">Reset</button>
  </div>
</header>

<section class="stats">
  <div class="stat"><b id="packs">0</b><span>Packs opened</span></div>
  <div class="stat"><b id="owned">0</b><span>Unique cards</span></div>
  <div class="stat"><b id="dupes">0</b><span>Duplicates</span></div>
  <div class="stat"><b id="hits">0</b><span>Hits pulled</span></div>
</section>

<section id="packzone" class="packzone"></section>

<div class="tabs">
  <div class="tab active" onclick="setView('all', this)">All</div>
  <div class="tab" onclick="setView('base', this)">Base</div>
  <div class="tab" onclick="setView('insert', this)">Inserts</div>
  <div class="tab" onclick="setView('auto', this)">Autos</div>
  <div class="tab" onclick="setView('dupes', this)">Dupes</div>
</div>
<section class="collection"><div id="collection" class="grid"></div></section>
</div>

atson", "team": "Brighton & Hove Albion", "tag": "AUTO"}, {"set": "Sapphire Autograph", "no": "CA-UF", "name": "El Hadji Malick Diouf", "team": "West Ham United", "tag": "AUTO"}, {"set": "Sapphire Autograph", "no": "CA-VG", "name": "Viktor Gyökeres", "team": "Arsenal", "tag": "AUTO"}, {"set": "Sapphire Autograph", "no": "CA-VV", "name": "Virgil van Dijk", "team": "Liverpool FC", "tag": "AUTO"}, {"set": "Sapphire Autograph", "no": "CA-WH", "name": "Adam Wharton", "team": "Crystal Palace", "tag": "AUTO"}, {"set": "Sapphire Autograph", "no": "CA-WR", "name": "Wayne Rooney", "team": "Manchester United", "tag": "AUTO"}, {"set": "Sapphire Autograph", "no": "CA-XS", "name": "Xavi Simons", "team": "Tottenham Hotspur", "tag": "AUTO"}, {"set": "Sapphire Autograph", "no": "CA-YA", "name": "Yaya Touré", "team": "Manchester City", "tag": "AUTO"}, {"set": "Sapphire Autograph", "no": "CA-YI", "name": "Yasin Ayari", "team": "Brighton & Hove Albion", "tag": "AUTO"}, {"set": "Sapphire Autograph", "no": "CA-ZI", "name": "Zlatan Ibrahimović", "team": "Manchester United", "tag": "AUTO"}, {"set": "Sapphire Autograph", "no": "CA-DB", "name": "David Beckham", "team": "Manchester United", "tag": "AUTO"}, {"set": "Sapphire Autograph", "no": "CA-MS", "name": "Mohamed Salah", "team": "Liverpool FC", "tag": "AUTO"}, {"set": "Sapphire Autograph", "no": "CA-MD", "name": "Max Dowman", "team": "Arsenal", "tag": "AUTO"}]};
const state = JSON.parse(localStorage.getItem("sapphirePackState") || '{"packs":0,"owned":{},"dupes":0,"hits":0}');
let currentView = "all";

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function chance(n) { return Math.random() < 1/n; }
const parallels = [
  ["Green",5], ["Gold",9], ["Orange",17], ["Purple",28], ["Black",42], ["Red",85], ["Padparadscha",421]
];

function parallelFor(kind) {
  for (const [name, odds] of parallels.slice().reverse()) if (chance(odds)) return name;
  return "Base";
}

function makeCard(kind) {
  let card;
  if (kind === "auto") {
    card = {...pick(DATA.autos), kind:"auto", parallel: chance(25) ? pick(["Gold","Orange","Purple","Black","Red"]) : "Base"};
  } else if (kind === "insert") {
    card = {...pick(DATA.inserts), kind:"insert", parallel: chance(85) ? pick(["Black","Red","Padparadscha"]) : "Base"};
  } else {
    card = {...pick(DATA.base), kind:"base", parallel: parallelFor("base")};
  }
  card.key = `${card.kind}|${card.set}|${card.no}|${card.parallel}`;
  return card;
}

function openPack() {
  const pack = [makeCard("base"), makeCard("base"), makeCard("base")];
  if (chance(39)) pack.push(makeCard("auto"));
  else if (chance(3)) pack.push(makeCard("insert"));
  else pack.push(makeCard("base"));
  state.packs++;
  const zone = document.getElementById("packzone");
  zone.innerHTML = "";
  pack.forEach((card, i) => {
    if (state.owned[card.key]) { state.owned[card.key].count++; state.dupes++; }
    else state.owned[card.key] = {...card, count:1};
    if (card.kind !== "base" || card.parallel !== "Base") state.hits++;
    const el = renderCard(card);
    el.style.animationDelay = `${i * .12}s`;
    zone.appendChild(el);
  });
  save();
}

function renderCard(card) {
  const el = document.createElement("div");
  const parClass = card.parallel !== "Base" ? ` parallel-${card.parallel}` : "";
  el.className = `card ${card.kind}${card.kind==="auto" ? " auto" : ""}${card.kind==="insert" ? " insert" : ""}${parClass}`;
  const initials = card.name.split(/\s+/).map(x=>x[0]).join("").slice(0,3).toUpperCase();
  const title = card.kind === "base" ? "Base Set" : card.set;
  const badge = card.parallel === "Base" ? (card.kind==="auto" ? "AUTO" : card.kind==="insert" ? "INSERT" : "SAPPHIRE") : card.parallel;
  el.innerHTML = `
    <div class="side"><span>${escapeHtml(card.name)}</span></div>
    <div class="logo">topps chrome</div>
    <div class="rarity">${escapeHtml(badge)}</div>
    <div class="player">${escapeHtml(initials)}</div>
    <div class="info">
      <div class="no">${escapeHtml(card.no)} · ${escapeHtml(title)}</div>
      <div class="name">${escapeHtml(card.name)}</div>
      <div class="team">${escapeHtml(card.team)}</div>
    </div>
    ${card.tag === "RC" ? '<div class="rc">RC</div>' : ""}
    ${card.kind === "auto" ? '<div class="sig">Certified Autograph</div>' : ""}
    <div class="badge">${escapeHtml(card.team.replace(" FC","").split(" ").slice(0,2).join(" "))}</div>
  `;
  return el;
}

function escapeHtml(s) {
  return String(s || "").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function setView(v, el) {
  currentView = v;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
  drawCollection();
}

function drawCollection() {
  document.getElementById("packs").textContent = state.packs;
  document.getElementById("owned").textContent = Object.keys(state.owned).length;
  document.getElementById("dupes").textContent = state.dupes;
  document.getElementById("hits").textContent = state.hits;
  let cards = Object.values(state.owned).sort((a,b)=>a.kind.localeCompare(b.kind)||a.set.localeCompare(b.set)||String(a.no).localeCompare(String(b.no), undefined, {numeric:true}));
  if (currentView !== "all") {
    if (currentView === "dupes") cards = cards.filter(c=>c.count > 1);
    else cards = cards.filter(c=>c.kind === currentView);
  }
  const box = document.getElementById("collection");
  box.innerHTML = cards.length ? cards.map(c => `
    <div class="item">
      <div><b>${escapeHtml(c.name)}</b><br><small>${escapeHtml(c.set)} #${escapeHtml(c.no)} · ${escapeHtml(c.team)} · ${escapeHtml(c.parallel)}</small></div>
      <div>x${c.count}</div>
    </div>`).join("") : '<div class="item">No cards here yet. Open a pack!</div>';
}

function save() {
  localStorage.setItem("sapphirePackState", JSON.stringify(state));
  drawCollection();
}

function resetGame() {
  if (!confirm("Reset your collection?")) return;
  localStorage.removeItem("sapphirePackState");
  location.reload();
}

drawCollection();
</script>
